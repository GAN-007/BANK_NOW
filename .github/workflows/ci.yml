name: Verify BANK NOW

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://banknow:banknow@localhost:5432/banknow
      SESSION_PEPPER: ci-session-pepper-with-at-least-thirty-two-characters
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_IDLE_MINUTES: 30
      SESSION_ABSOLUTE_HOURS: 720
      PROVIDER_HTTP_TIMEOUT_MS: 10000
      TRUSTED_PROXY_HOPS: 0
      OPERATIONS_SECRET: ci-operations-secret-with-at-least-thirty-two-characters
      RESEND_API_KEY: re_ci_test
      EMAIL_FROM: Bank Now <ci@example.com>
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --include=dev
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=moderate

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: banknow_test
          POSTGRES_USER: banknow
          POSTGRES_PASSWORD: banknow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banknow -d banknow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://banknow:banknow@localhost:5432/banknow_test?schema=public
      SESSION_PEPPER: ci-session-pepper-with-at-least-thirty-two-characters
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_IDLE_MINUTES: 30
      SESSION_ABSOLUTE_HOURS: 720
      PROVIDER_HTTP_TIMEOUT_MS: 10000
      TRUSTED_PROXY_HOPS: 0
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code
      - run: npm run test:integration
