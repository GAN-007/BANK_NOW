name: Verify BANK NOW

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://banknow:banknow@localhost:5432/banknow
      SESSION_PEPPER: ci-session-pepper-with-at-least-thirty-two-characters
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      RESEND_API_KEY: re_ci_test
      EMAIL_FROM: Bank Now <ci@example.com>
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
