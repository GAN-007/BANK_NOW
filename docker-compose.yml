services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: banknow
      POSTGRES_USER: banknow
      POSTGRES_PASSWORD: banknow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banknow -d banknow"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - banknow_postgres:/var/lib/postgresql/data

volumes:
  banknow_postgres:
